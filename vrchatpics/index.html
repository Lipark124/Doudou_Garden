<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VRChat Pics - Dream Doudou</title>
    <meta name="description" content="Lipark の VRChat スクリーンショット集。VRの思い出！" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <style>
        /* ===== VRChat Pics ページ専用 ===== */
        .vr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 10px;
        }
        .vr-card {
            position: relative;
            background: #0e0a18;
            border: 3px solid #1a1030;
            border-top: 3px solid #5a3d20;
            border-left: 3px solid #5a3d20;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: none;
        }
        .vr-card:hover {
            border-color: #c8a0f0;
            transform: scale(1.02);
        }
        .vr-card:active { transform: scale(0.98); }
        .vr-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: pixelated;
        }
        .vr-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,5,20,0.9) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.15s;
            display: flex;
            align-items: flex-end;
            padding: 6px 8px;
        }
        .vr-card:hover .vr-card-overlay { opacity: 1; }
        .vr-card-label {
            font-family: 'Silkscreen', monospace;
            font-size: 0.52rem;
            color: #e0c8ff;
            letter-spacing: 1px;
        }
        .vr-placeholder {
            opacity: 0.3;
            cursor: default;
            font-size: 1.8rem;
        }
        .vr-placeholder:hover { border-color: #1a1030; transform: none; }

        /* ライトボックス */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .lightbox.open { display: flex; }
        .lightbox-img {
            max-width: 90vw;
            max-height: 90vh;
            border: 4px solid #8b6032;
            box-shadow: 0 0 0 2px #c8a0f0;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 24px;
            font-family: 'Silkscreen', monospace;
            font-size: 1rem;
            color: #f5e0a0;
            cursor: pointer;
            background: #5a3d20;
            border: 2px solid #8b6032;
            padding: 4px 10px;
        }
        .lightbox-close:hover { background: #8b6032; }
        .lightbox-caption {
            position: absolute;
            bottom: 20px;
            font-family: 'Silkscreen', monospace;
            font-size: 0.65rem;
            color: #e0c8ff;
            letter-spacing: 2px;
        }

        .wip-banner {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1028;
            border: 2px dashed #8050c0;
            padding: 10px 16px;
            margin-bottom: 14px;
            font-family: 'Silkscreen', monospace;
            font-size: 0.65rem;
            color: #c8a0f0;
            letter-spacing: 1px;
        }

        /* VRChatカラーアクセント */
        .panel-title.vr-accent { color: #c8a0f0; }
    </style>
</head>

<body>
    <div class="plant-decor plant-left">
        <img src="../resource/plants-left.png" alt="" draggable="false" />
    </div>
    <div class="plant-decor plant-right">
        <img src="../resource/plants-right.png" alt="" draggable="false" />
    </div>

    <div class="board-scene">
        <!-- ① タイトル板 -->
        <div class="title-board" id="title-board" style="animation-duration:7s;">
            <img src="../resource/title_board.png" alt="VRChat Pics" class="title-board-img" draggable="false" />
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Silkscreen',monospace;font-size:clamp(0.75rem,2.5vw,1.6rem);font-weight:700;color:#e0c8ff;text-shadow:2px 2px 0 #1a0a30;letter-spacing:3px;pointer-events:none;">
                🥽 VRChat Pics
            </div>
            <div class="lang-switch">
                <span class="lang-current pixel-btn">🇯🇵 JP</span>
                <a href="#" class="lang-link pixel-btn">🇺🇸 EN</a>
            </div>
        </div>

        <!-- ② フック行 -->
        <div class="hooks-row">
            <img src="../resource/hooks.png" alt="" class="hooks-img" draggable="false" />
        </div>

        <!-- ③ ハンギングパネル -->
        <div class="hanging-panels" style="align-items:flex-start;">

            <!-- 左:ナビ -->
            <div class="panel panel-nav" style="animation:swayLeft 4s ease-in-out infinite;">
                <div class="panel-inner">
                    <h3 class="panel-title pixel-text">NAVIGATE</h3>
                    <nav class="panel-nav-links">
                        <a href="../index.html" class="wood-btn">
                            <img src="../resource/icons/gallery.png" alt="" /><span>← Home</span>
                        </a>
                        <a href="../gallery/index.html" class="wood-btn">
                            <img src="../resource/icons/gallery.png" alt="" /><span>Gallery</span>
                        </a>
                        <a href="../lore/index.html" class="wood-btn">
                            <img src="../resource/icons/lore.png" alt="" /><span>Lore</span>
                        </a>
                        <a href="../cardboardbox/index.html" class="wood-btn">
                            <img src="../resource/icons/experiment.png" alt="" /><span>Experiment</span>
                        </a>
                    </nav>
                </div>
            </div>

            <!-- 中央:VRChatメイン -->
            <div class="panel panel-about" style="flex:2.2;animation:swayCenter 4.5s ease-in-out infinite;">
                <div class="panel-inner">
                    <h3 class="panel-title pixel-text vr-accent">VRChat PICS</h3>
                    <div class="about-paper-container" style="clip-path:none;background:#0e0a1a;border:3px solid #1a1030;border-top:3px solid #8050c0;border-left:3px solid #8050c0;padding:14px;gap:10px;">

                        <div class="wip-banner">
                            <span>🥽</span>
                            <span>VRChat の思い出スクショ！　クリックで拡大できるよ</span>
                        </div>

                        <!-- 写真グリッド -->
                        <div class="vr-grid" id="vr-grid">
                            <!--
                                ここに VRChat スクリーンショットを追加してね！
                                例:
                                <div class="vr-card" data-label="ワールド名 - 2025">
                                    <img src="../resource/vrchat/xxxxx.jpg" alt="VRChat screenshot" />
                                    <div class="vr-card-overlay">
                                        <span class="vr-card-label">ワールド名 · 2025.xx.xx</span>
                                    </div>
                                </div>
                            -->

                            <!-- プレースホルダー（画像追加したら消してね） -->
                            <div class="vr-card vr-placeholder"><span>🌐</span></div>
                            <div class="vr-card vr-placeholder"><span>🥽</span></div>
                            <div class="vr-card vr-placeholder"><span>🌌</span></div>
                            <div class="vr-card vr-placeholder"><span>🏠</span></div>
                            <div class="vr-card vr-placeholder"><span>🎭</span></div>
                            <div class="vr-card vr-placeholder"><span>✨</span></div>
                            <div class="vr-card vr-placeholder"><span>🌸</span></div>
                            <div class="vr-card vr-placeholder"><span>🎪</span></div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- 右:ソーシャル -->
            <div class="panel panel-social" style="animation:swayRight 5s ease-in-out infinite;">
                <div class="panel-inner">
                    <h3 class="panel-title pixel-text">SOCIALS</h3>
                    <nav class="panel-nav-links">
                        <a href="#" class="wood-btn"><img src="../resource/icons/twitter.png" alt="" /><span>Twitter</span></a>
                        <a href="#" class="wood-btn"><img src="../resource/icons/discord.png" alt="" /><span>Discord</span></a>
                        <a href="#" class="wood-btn"><img src="../resource/icons/bluesky.png" alt="" /><span>Bluesky</span></a>
                        <a href="#" class="wood-btn"><img src="../resource/icons/steam.png" alt="" /><span>Steam</span></a>
                        <a href="#" class="wood-btn"><img src="../resource/icons/telegram.png" alt="" /><span>Telegram</span></a>
                        <a href="https://neocities.org" class="wood-btn"><img src="../resource/icons/neocities.png" alt="" /><span>Neocities</span></a>
                    </nav>
                </div>
            </div>
        </div>

        <!-- ④ 木棚 -->
        <div class="shelf-row">
            <img src="../resource/shelf.png" alt="" class="shelf-img" draggable="false" />
        </div>

        <div class="footer"><p>~ 2026年から愛を込めて ~</p></div>
    </div>

    <!-- ライトボックス -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">✕ 閉じる</span>
        <img src="" alt="" class="lightbox-img" id="lightbox-img" />
        <span class="lightbox-caption" id="lightbox-caption"></span>
    </div>

    <script src="../script.js"></script>
    <script>
        // VRChat カード ライトボックス
        const lightbox      = document.getElementById('lightbox');
        const lightboxImg   = document.getElementById('lightbox-img');
        const lightboxCap   = document.getElementById('lightbox-caption');
        const closeBtn      = document.getElementById('lightbox-close');

        document.querySelectorAll('.vr-card:not(.vr-placeholder)').forEach(card => {
            card.addEventListener('click', () => {
                const img = card.querySelector('img');
                if (!img) return;
                lightboxImg.src = img.src;
                lightboxCap.textContent = card.dataset.label || '';
                lightbox.classList.add('open');
            });
        });

        lightbox.addEventListener('click', e => {
            if (e.target === lightbox || e.target === closeBtn) {
                lightbox.classList.remove('open');
            }
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') lightbox.classList.remove('open');
        });
    </script>
</body>
</html>
