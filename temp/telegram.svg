<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Background Circle (Square in retro feel) -->
  <rect x="1" y="1" width="14" height="14" rx="3" fill="#24A1DE"/>
  
  <!-- Paper Plane -->
  <rect x="12" y="3" width="2" height="2" fill="#FFFFFF"/>
  <rect x="11" y="4" width="2" height="2" fill="#FFFFFF"/>
  <rect x="10" y="5" width="2" height="2" fill="#FFFFFF"/>
  <rect x="9" y="6" width="2" height="2" fill="#FFFFFF"/>
  <rect x="8" y="7" width="2" height="2" fill="#FFFFFF"/>
  <rect x="7" y="8" width="2" height="2" fill="#FFFFFF"/>
  
  <!-- Top wing edge -->
  <rect x="6" y="5" width="6" height="3" fill="#FFFFFF"/>
  <rect x="4" y="6" width="4" height="2" fill="#FFFFFF"/>
  <rect x="3" y="7" width="2" height="1" fill="#FFFFFF"/>
  
  <!-- Bottom wing edge -->
  <rect x="9" y="8" width="3" height="5" fill="#FFFFFF"/>
  <rect x="8" y="9" width="2" height="4" fill="#FFFFFF"/>
  <rect x="8" y="12" width="1" height="2" fill="#FFFFFF"/>
  
  <!-- Fold shadow -->
  <rect x="8" y="8" width="2" height="3" fill="#D0E5F2"/>
</svg>
