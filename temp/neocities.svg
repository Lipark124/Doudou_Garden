<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Background -->
  <rect x="2" y="2" width="12" height="12" fill="#000000"/>
  
  <!-- Cat Head Outline -->
  <rect x="4" y="3" width="8" height="8" fill="#FFC107"/>
  <rect x="3" y="4" width="10" height="6" fill="#FFC107"/>
  
  <!-- Ears -->
  <rect x="3" y="2" width="2" height="2" fill="#FFC107"/>
  <rect x="11" y="2" width="2" height="2" fill="#FFC107"/>
  
  <!-- Eyes -->
  <rect x="4" y="5" width="2" height="2" fill="#E91E63"/>
  <rect x="10" y="5" width="2" height="2" fill="#E91E63"/>
  <rect x="5" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="11" y="5" width="1" height="1" fill="#FFFFFF"/>
  
  <!-- Nose/Mouth -->
  <rect x="7" y="7" width="2" height="1" fill="#000000"/>
</svg>
