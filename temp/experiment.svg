<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Box Outline -->
  <rect x="1" y="4" width="14" height="11" fill="#3D3028"/>
  <rect x="0" y="3" width="7" height="3" fill="#3D3028"/>
  <rect x="9" y="3" width="7" height="3" fill="#3D3028"/>
  <!-- Box Body -->
  <rect x="2" y="5" width="12" height="9" fill="#D2B48C"/>
  <rect x="3" y="6" width="10" height="7" fill="#C19A6B"/>
  <!-- Inside -->
  <rect x="2" y="4" width="12" height="1" fill="#8B5A2B"/>
  <!-- Left Flap -->
  <rect x="1" y="4" width="5" height="1" fill="#D2B48C"/>
  <!-- Right Flap -->
  <rect x="10" y="4" width="5" height="1" fill="#D2B48C"/>
  <!-- Tape -->
  <rect x="7" y="5" width="2" height="9" fill="#F5DEB3"/>
  <!-- Symbol (Arrow up) -->
  <rect x="4" y="8" width="1" height="3" fill="#3D3028"/>
  <rect x="4" y="7" width="1" height="1" fill="#3D3028"/>
  <rect x="3" y="8" width="1" height="1" fill="#3D3028"/>
  <rect x="5" y="8" width="1" height="1" fill="#3D3028"/>
</svg>
