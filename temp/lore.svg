<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Book Cover Outline -->
  <rect x="2" y="1" width="11" height="14" fill="#3D3028"/>
  <!-- Book Cover -->
  <rect x="3" y="2" width="9" height="12" fill="#6B4C35"/>
  <!-- Spine Detail -->
  <rect x="3" y="2" width="2" height="12" fill="#4A3728"/>
  <!-- Pages / Label -->
  <rect x="6" y="4" width="4" height="6" fill="#F0E6D3"/>
  <!-- Text lines -->
  <rect x="7" y="5" width="2" height="1" fill="#3D3028"/>
  <rect x="7" y="7" width="2" height="1" fill="#3D3028"/>
  <!-- Bookmark -->
  <rect x="8" y="10" width="2" height="5" fill="#E53935"/>
  <rect x="8" y="14" width="1" height="1" fill="#B71C1C"/>
</svg>
