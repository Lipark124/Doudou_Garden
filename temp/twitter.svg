<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="100%" height="100%" shape-rendering="crispEdges">
  <!-- Bird Body -->
  <rect x="4" y="5" width="8" height="6" fill="#1DA1F2"/>
  <rect x="5" y="4" width="6" height="8" fill="#1DA1F2"/>
  
  <!-- Wings / Details -->
  <rect x="2" y="6" width="2" height="2" fill="#1DA1F2"/>
  <rect x="3" y="5" width="2" height="2" fill="#1DA1F2"/>
  <rect x="3" y="7" width="2" height="2" fill="#1DA1F2"/>

  <!-- Head / Beak -->
  <rect x="10" y="3" width="3" height="3" fill="#1DA1F2"/>
  <rect x="12" y="4" width="3" height="1" fill="#1DA1F2"/>
  <rect x="12" y="5" width="2" height="1" fill="#1DA1F2"/>
  
  <!-- Tail -->
  <rect x="3" y="9" width="3" height="2" fill="#1DA1F2"/>
  <rect x="2" y="10" width="2" height="2" fill="#1DA1F2"/>
</svg>
