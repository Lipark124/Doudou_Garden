<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery - Dream Doudou</title>
    <meta name="description" content="Lipark のギャラリー。絵やドット絵、創作物を展示しているよ！" />
    <link rel="icon" href="../temp/nano_banana.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Silkscreen:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <style>
        /* ======= ギャラリーページ専用スタイル ======= */

        /* WIP バナー */
        .wip-banner {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #3a2a08;
            border: 2px dashed #8b6032;
            padding: 10px 16px;
            margin-bottom: 14px;
            font-family: 'Silkscreen', monospace;
            font-size: 0.65rem;
            color: #c8a860;
            letter-spacing: 1px;
        }

        /* コンテンツパネル */
        .sub-content-panel {
            background: #3a2808;
            border: 4px solid #2a1a08;
            border-top: 4px solid #5a3d20;
            border-left: 4px solid #5a3d20;
            padding: 16px;
            box-shadow: 6px 10px 0 rgba(0, 0, 0, 0.7);
            flex: 1;
            min-height: 200px;
        }

        /* 空状態テキスト */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 40px 16px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 3rem;
            opacity: 0.4;
        }

        .empty-state-text {
            font-family: 'DotGothic16', monospace;
            font-size: 0.75rem;
            color: #8a7050;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <!-- 植物デコ -->
    <div class="plant-decor plant-left">
        <img src="../resource/plants-left.png" alt="" draggable="false" />
    </div>
    <div class="plant-decor plant-right">
        <img src="../resource/plants-right.png" alt="" draggable="false" />
    </div>

    <div class="board-scene">

        <!-- ① タイトル板 -->
        <div class="title-board" id="title-board" style="animation-duration:6s;">
            <img src="../resource/title_board.png" alt="Gallery" class="title-board-img" draggable="false" />
            <div
                style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Silkscreen',monospace;font-size:clamp(1rem,3vw,2rem);font-weight:700;color:#f5e0a0;text-shadow:2px 2px 0 #2a1608;letter-spacing:4px;pointer-events:none;">
                🎨 Gallery
            </div>
            <div class="lang-switch">
                <span class="lang-current pixel-btn">🇯🇵 JP</span>
                <a href="../en/gallery/index.html" class="lang-link pixel-btn">🇺🇸 EN</a>
            </div>
        </div>

        <!-- ③ 3列パネル -->
        <div class="hanging-panels">

            <!-- 左：ナビゲーション -->
            <div class="panel panel-nav sway-left">
                <img src="../resource/pin.png" alt="" class="panel-pin" draggable="false" />
                <div class="panel-inner wood-panel">
                    <h2 class="panel-title pixel-text">Navigate</h2>
                    <nav class="wood-btn-list">
                        <a href="../index.html" class="wood-btn">
                            <img src="../resource/icons/gallery.png" alt="" />
                            <span>← Home</span>
                        </a>
                        <a href="../lore/index.html" class="wood-btn">
                            <img src="../resource/icons/lore.png" alt="" />
                            <span>Lore</span>
                        </a>
                        <a href="../cardboardbox/index.html" class="wood-btn">
                            <img src="../resource/icons/experiment.png" alt="" />
                            <span>Experiment</span>
                        </a>
                        <a href="../vrchatpics/index.html" class="wood-btn">
                            <img src="../resource/icons/vrchat.png" alt="" />
                            <span>VRChat</span>
                        </a>
                    </nav>
                </div>
            </div>

            <!-- 中央：ギャラリーメイン -->
            <div class="panel panel-about sway-center">
                <img src="../resource/pin.png" alt="" class="panel-pin" draggable="false" />
                <div class="panel-inner">
                    <div class="sub-content-panel">

                        <div class="wip-banner">
                            <span>✏️</span>
                            <span>絵や作品が増えたらどんどん追加していくよ！お楽しみに！</span>
                        </div>

                        <div class="empty-state">
                            <span class="empty-state-icon">🎨</span>
                            <p class="empty-state-text">
                                Coming Soon...<br />
                                作品を準備中だよ！
                            </p>
                        </div>

                    </div>
                </div>
            </div>

            <!-- 右：ソーシャル -->
            <div class="panel panel-social sway-right">
                <img src="../resource/pin.png" alt="" class="panel-pin" draggable="false" />
                <div class="panel-inner wood-panel">
                    <h2 class="panel-title pixel-text">Socials</h2>
                    <nav class="wood-btn-list">
                        <a href="#" class="wood-btn" id="btn-twitter">
                            <img src="../resource/icons/twitter.png" alt="" />
                            <span>Twitter</span>
                        </a>
                        <a href="#" class="wood-btn" id="btn-discord">
                            <img src="../resource/icons/discord.png" alt="" />
                            <span>Discord</span>
                        </a>
                        <a href="#" class="wood-btn" id="btn-bluesky">
                            <img src="../resource/icons/bluesky.png" alt="" />
                            <span>Bluesky</span>
                        </a>
                        <a href="#" class="wood-btn" id="btn-steam">
                            <img src="../resource/icons/steam.png" alt="" />
                            <span>Steam</span>
                        </a>
                        <a href="#" class="wood-btn" id="btn-telegram">
                            <img src="../resource/icons/telegram.png" alt="" />
                            <span>Telegram</span>
                        </a>
                        <a href="https://neocities.org" class="wood-btn" id="btn-neocities">
                            <img src="../resource/icons/neocities.png" alt="" />
                            <span>Neocities</span>
                        </a>
                    </nav>
                </div>
            </div>

        </div>

        <!-- ④ 木棚 -->
        <div class="shelf-row">
            <img src="../resource/shelf.png" alt="" class="shelf-img" draggable="false" />
        </div>

        <!-- フッター -->
        <div class="footer">
            <p class="pixel-text">~ 2026年から愛を込めて ~</p>
        </div>

    </div>

    <script src="../script.js"></script>

</body>

</html>
